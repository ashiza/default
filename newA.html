<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stamp Maker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            padding: 20px;
        }
        #preview {
            border: 2px dashed #ccc;
            width: 300px;
            height: 150px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #fff;
        }
        input, button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Stamp Maker</h1>
    <label for="textInput">Text for Stamp:</label>
    <input type="text" id="textInput" placeholder="Enter text here" />
    <br />
    <label for="colorInput">Stamp Color:</label>
    <input type="color" id="colorInput" />
    <br />
    <button id="exportButton">Export Stamp</button>
    <div id="preview">Live Preview</div>
    <script>
        const textInput = document.getElementById('textInput');
        const colorInput = document.getElementById('colorInput');
        const preview = document.getElementById('preview');
        const exportButton = document.getElementById('exportButton');

        // Update live preview
        function updatePreview() {
            preview.innerHTML = textInput.value || 'Live Preview';
            preview.style.color = colorInput.value;
        }

        textInput.addEventListener('input', updatePreview);
        colorInput.addEventListener('input', updatePreview);

        // Export stamp functionality
        exportButton.addEventListener('click', () => {
            const stamp = preview.innerHTML;
            const blob = new Blob([stamp], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'stamp.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
